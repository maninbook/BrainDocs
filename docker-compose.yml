services:
  # ─── 프론트엔드 ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

  # ─── 백엔드 ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    ports:
      - "8001:8000"  # 8000은 DataMaster deploy-api가 사용 중이라 8001로 변경
    volumes:
      - ./backend:/app
      - ./data/uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql+asyncpg://braindocs:braindocs@postgres:5432/braindocs
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=braindocs123
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-gemini}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-768}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-prod}
    depends_on:
      - postgres
      - neo4j
      - qdrant
      - redis

  # ─── Celery 워커 ──────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: celery -A app.workers.celery_app worker --loglevel=info -Q ingestion,embedding,rag
    volumes:
      - ./backend:/app
      - ./data/uploads:/app/uploads
    environment:
      - DATABASE_URL=postgresql+asyncpg://braindocs:braindocs@postgres:5432/braindocs
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=braindocs123
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-gemini}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-768}
    depends_on:
      - redis
      - postgres

  # ─── Celery Beat (스케줄러) ───────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    command: celery -A app.workers.celery_app beat --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  # ─── 데이터베이스들 ────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=braindocs
      - POSTGRES_USER=braindocs
      - POSTGRES_PASSWORD=braindocs
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  neo4j:
    image: neo4j:5.18-community
    environment:
      - NEO4J_AUTH=neo4j/braindocs123
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
    volumes:
      - neo4j_data:/data
    ports:
      - "7475:7474"  # 브라우저 (7474는 DataMaster deploy가 사용 중이라 7475로 변경)
      - "7688:7687"  # Bolt

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
  redis_data:
